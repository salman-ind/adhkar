<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Tasbih</title>
  <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Tasbih%22,%22short_name%22:%22Tasbih%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22orientation%22:%22portrait%22,%22background_color%22:%22%2309090c%22,%22theme_color%22:%22%2309090c%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20512%20512'%3E%3Crect%20width='512'%20height='512'%20rx='100'%20fill='%2308090c'/%3E%3Ccircle%20cx='256'%20cy='256'%20r='190'%20fill='none'%20stroke='%23161e28'%20stroke-width='22'/%3E%3Ccircle%20cx='256'%20cy='256'%20r='190'%20fill='none'%20stroke='%23c9aa52'%20stroke-width='22'%20stroke-linecap='round'%20stroke-dasharray='894.6'%20stroke-dashoffset='224'%20transform='rotate(-90%20256%20256)'/%3E%3Ctext%20x='256'%20y='286'%20text-anchor='middle'%20font-family='serif'%20font-size='130'%20fill='%23c9aa52'%3E%D8%B0%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22any%22,%22type%22:%22image/svg+xml%22,%22purpose%22:%22any%20maskable%22}]}">
  <meta name="theme-color" content="#09090c" id="themeMetaColor">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Tasbih">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Scheherazade+New:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

    :root,[data-theme="dark"]{
      --bg:#09090c; --surface:#0f1115; --surface2:#161b22;
      --border:#1e222c;
      --gold:#c9aa52; --gold-soft:#dfc070; --gold-dim:#7a6430; --gold-glow:rgba(201,170,82,0.22);
      --green:#2d6a4f; --green-bright:#52b788;
      --text:#dfd8c8; --text-sub:#998d7c; --text-muted:#4e4840;
      --track:#13171f; --hdr-bg:#0b0c10;
      --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
    }
    [data-theme="light"]{
      --bg:#f5f0e8; --surface:#fffdf7; --surface2:#f0ebe0;
      --border:#ddd6c6;
      --gold:#9a7a28; --gold-soft:#b8942e; --gold-dim:#c4a44a; --gold-glow:rgba(154,122,40,0.18);
      --green:#1e6644; --green-bright:#2d8653;
      --text:#2a2418; --text-sub:#6b5e48; --text-muted:#a89880;
      --track:#e4ddd0; --hdr-bg:#edeadf;
    }

    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Cinzel',serif;overflow:hidden;overscroll-behavior:none;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}

    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:radial-gradient(ellipse 80% 55% at 50% 0%,rgba(201,170,82,.055) 0%,transparent 65%),
        radial-gradient(ellipse 60% 40% at 50% 100%,rgba(201,170,82,.035) 0%,transparent 60%)}

    #app{position:relative;z-index:1;height:100%;display:flex;flex-direction:column}

    /* ── Top bar ────────────────────────── */
    .top-bar{flex-shrink:0;display:flex;align-items:center;justify-content:flex-end;gap:6px;
      padding:calc(var(--safe-t) + 8px) 14px 8px;background:var(--hdr-bg);border-bottom:1px solid var(--border);transition:background .3s}

    .icon-toggle{width:38px;height:38px;display:flex;align-items:center;justify-content:center;
      border-radius:10px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;
      font-size:17px;line-height:1;color:var(--text-sub);transition:all .18s;user-select:none}
    .icon-toggle:active{opacity:.65}
    .icon-toggle.on{color:var(--gold);border-color:var(--gold-dim);background:rgba(201,170,82,.09)}
    .icon-toggle.off{color:var(--text-muted)}

    /* ── Tabs ───────────────────────────── */
    .tab{display:none;flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
    .tab.active{display:flex;flex-direction:column}

    /* ── Counter Tab ────────────────────── */
    #tab-counter{align-items:center;justify-content:center;gap:0;
      padding:12px 20px calc(var(--safe-b) + 12px)}

    /* dhikr text block — only visible in session */
    .dhikr-block{
      width:100%;max-width:400px;flex-shrink:0;
      text-align:center;margin-bottom:14px;
      display:none;
    }
    .dhikr-block.visible{display:block}

    .dhikr-step{
      font-size:11px;letter-spacing:.16em;text-transform:uppercase;
      color:var(--gold);margin-bottom:10px;
    }
    .dhikr-arabic{
      font-family:'Scheherazade New',serif;
      font-size:clamp(22px,6.5vw,32px);
      line-height:2;direction:rtl;color:var(--text);
      margin-bottom:8px;
    }
    .dhikr-translation{
      font-family:'Lato',sans-serif;font-weight:300;
      font-size:clamp(11px,3.2vw,13.5px);
      color:var(--text-sub);line-height:1.65;font-style:italic;
    }
    .dhikr-source{
      font-family:'Lato',sans-serif;font-size:10px;
      color:var(--text-muted);margin-top:6px;letter-spacing:.03em;
    }

    /* ── Ring ───────────────────────────── */
    .ring-wrap{
      position:relative;
      width:min(72vw,310px);height:min(72vw,310px);
      flex-shrink:0;margin-bottom:8px;
      transition:width .3s,height .3s;
    }
    .ring-wrap.small{width:min(55vw,230px);height:min(55vw,230px)}

    .tap-zone{position:absolute;inset:0;border-radius:50%;cursor:pointer;
      user-select:none;-webkit-user-select:none;
      display:flex;align-items:center;justify-content:center}
    .tap-zone.tapped{animation:tapPop .17s ease}
    @keyframes tapPop{0%,100%{transform:scale(1)}40%{transform:scale(.955)}}

    .ring-svg{width:100%;height:100%;overflow:visible}
    .r-track{fill:none;stroke:var(--track);stroke-width:14;transition:stroke .3s}
    .r-fill{fill:none;stroke:url(#rg);stroke-width:14;stroke-linecap:round;
      transform-origin:50% 50%;transform:rotate(-90deg);
      transition:stroke-dashoffset .28s cubic-bezier(.4,0,.2,1)}
    .r-fill.done{filter:drop-shadow(0 0 8px var(--gold)) drop-shadow(0 0 18px var(--gold-glow));
      transition:stroke-dashoffset .28s cubic-bezier(.4,0,.2,1),filter .4s}

    .ring-wrap::after{content:'';position:absolute;inset:-10px;border-radius:50%;
      border:1.5px solid var(--gold);opacity:0;pointer-events:none}
    .ring-wrap.glow::after{animation:outerGlow .55s ease-out forwards}
    @keyframes outerGlow{0%{opacity:.5;transform:scale(.93)}100%{opacity:0;transform:scale(1.05)}}

    .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;pointer-events:none}
    .count-num{font-size:clamp(58px,17vw,80px);font-weight:500;color:var(--text);
      line-height:1;transition:transform .08s ease,color .3s}
    .ring-wrap.small .count-num{font-size:clamp(44px,13vw,62px)}
    .count-num.bump{transform:scale(1.12)}
    .count-of{font-size:15px;letter-spacing:.06em;color:var(--text-sub);margin-top:6px;transition:color .3s}
    .ring-wrap.small .count-of{font-size:13px}

    /* ── Free-mode controls ─────────────── */
    .free-controls{display:flex;flex-direction:column;align-items:center;gap:0;width:100%}
    .free-controls.hidden{display:none}

    .goal-wrap{display:flex;align-items:center;gap:10px;margin-top:24px;flex-shrink:0}
    .goal-label{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-muted)}
    .goal-pills{display:flex;gap:7px}
    .pill{padding:8px 16px;border-radius:20px;font-family:'Cinzel',serif;font-size:14px;
      letter-spacing:.05em;cursor:pointer;border:1px solid var(--border);
      background:var(--surface);color:var(--text-sub);transition:all .18s}
    .pill.active{border-color:var(--gold-dim);background:rgba(201,170,82,.1);color:var(--gold)}
    .pill:active{opacity:.7}

    .goal-custom-wrap{display:flex;align-items:center;gap:8px;margin-top:14px}
    .goal-input{width:100px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);
      border-radius:10px;color:var(--text);font-family:'Cinzel',serif;font-size:17px;
      text-align:center;outline:none;appearance:none;-moz-appearance:textfield;
      transition:border-color .2s,background .3s,color .3s}
    .goal-input::-webkit-inner-spin-button,.goal-input::-webkit-outer-spin-button{-webkit-appearance:none}
    .goal-input:focus{border-color:var(--gold-dim)}
    .goal-set-btn{padding:10px 16px;border-radius:10px;border:1px solid var(--gold-dim);
      background:rgba(201,170,82,.08);color:var(--gold);font-family:'Cinzel',serif;
      font-size:13px;letter-spacing:.1em;cursor:pointer;transition:all .18s}
    .goal-set-btn:active{opacity:.7}

    /* ── Session controls ───────────────── */
    .session-controls{display:none;flex-direction:column;align-items:center;gap:10px;
      width:100%;max-width:320px;margin-top:16px}
    .session-controls.visible{display:flex}

    .session-progress{
      font-size:11px;letter-spacing:.14em;text-transform:uppercase;
      color:var(--text-muted);
    }

    .session-btns{display:flex;gap:10px;width:100%}

    /* ── Shared button base ─────────────── */
    .btn{flex:1;padding:14px 12px;border-radius:13px;cursor:pointer;
      font-family:'Cinzel',serif;font-size:12px;letter-spacing:.1em;transition:all .2s}
    .btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--text-sub)}
    .btn-ghost:active{color:var(--text);border-color:var(--text-muted)}
    .btn-end{background:rgba(201,170,82,.07);border:1px solid var(--gold-dim);color:var(--gold-dim)}
    .btn-end:active{opacity:.7}

    /* ── Flash ──────────────────────────── */
    .flash{position:fixed;inset:0;pointer-events:none;z-index:100;
      background:radial-gradient(circle at 50% 45%,rgba(201,170,82,.16) 0%,transparent 68%);opacity:0}
    .flash.show{animation:flashIn .6s ease-out forwards}
    @keyframes flashIn{0%{opacity:1}100%{opacity:0}}

    /* Complete overlay for session dhikr done */
    .complete-flash{position:fixed;inset:0;pointer-events:none;z-index:100;
      background:radial-gradient(circle at 50% 45%,rgba(82,183,136,.14) 0%,transparent 65%);opacity:0}
    .complete-flash.show{animation:flashIn .7s ease-out forwards}

    /* ── Adhkar Tab ─────────────────────── */
    #tab-adhkar{padding:0 0 calc(var(--safe-b) + 8px)}

    .adhkar-section{padding:18px 18px 0}

    .section-head{
      font-size:10px;letter-spacing:.18em;text-transform:uppercase;
      color:var(--gold);margin-bottom:12px;padding-left:1px;
    }

    .start-btn{
      width:100%;padding:15px 18px;margin-bottom:14px;
      border-radius:14px;cursor:pointer;
      font-family:'Cinzel',serif;font-size:13px;letter-spacing:.08em;
      display:flex;align-items:center;justify-content:space-between;
      transition:all .2s;
    }
    .start-btn-morning{
      background:rgba(201,170,82,.1);border:1px solid var(--gold-dim);color:var(--gold);
    }
    .start-btn-evening{
      background:rgba(82,183,136,.08);border:1px solid rgba(82,183,136,.35);color:var(--green-bright);
    }
    .start-btn:active{opacity:.75;transform:scale(.99)}
    .start-btn-arrow{font-size:16px;opacity:.7}

    .adhkar-list{display:flex;flex-direction:column;gap:0;
      background:var(--surface);border:1px solid var(--border);border-radius:14px;
      overflow:hidden;margin-bottom:24px}

    .adhkar-row{
      display:flex;align-items:center;gap:12px;
      padding:11px 15px;
      border-bottom:1px solid var(--border);
      transition:background .15s;
    }
    .adhkar-row:last-child{border-bottom:none}

    .adhkar-num{
      font-size:11px;color:var(--text-muted);
      min-width:18px;text-align:right;flex-shrink:0;
    }
    .adhkar-name{font-size:13px;color:var(--text-sub);flex:1}
    .adhkar-count{
      font-size:12px;color:var(--gold);
      background:rgba(201,170,82,.09);
      border:1px solid rgba(201,170,82,.18);
      padding:3px 9px;border-radius:10px;flex-shrink:0;
    }

    /* ── Nav ────────────────────────────── */
    .nav{flex-shrink:0;display:flex;background:var(--surface);
      border-top:1px solid var(--border);padding-bottom:var(--safe-b);transition:background .3s}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:10px 4px 8px;background:none;border:none;cursor:pointer;
      color:var(--text-muted);gap:4px;transition:color .2s}
    .nav-btn.active{color:var(--gold)}
    .nav-icon{font-size:23px;line-height:1}
    .nav-lbl{font-size:11.5px;letter-spacing:.1em;text-transform:uppercase}

    ::-webkit-scrollbar{width:0}
  </style>
</head>
<body>
<div id="app">
  <div class="flash" id="flash"></div>
  <div class="complete-flash" id="cflash"></div>

  <!-- ── Top bar ── -->
  <div class="top-bar">
    <button class="icon-toggle on"  id="btnHaptic" onclick="toggleHaptic()" title="Haptics">&#x1F4F3;</button>
    <button class="icon-toggle on"  id="btnSound"  onclick="toggleSound()"  title="Sound">&#x1F50A;</button>
    <button class="icon-toggle on"  id="btnTheme"  onclick="toggleTheme()"  title="Theme">&#x1F319;</button>
    <button class="icon-toggle off" id="btnInstall" onclick="installApp()"  title="Install" style="display:none">&#x2B07;&#xFE0F;</button>
  </div>

  <!-- ══════════ COUNTER TAB ══════════ -->
  <section class="tab active" id="tab-counter">

    <!-- shown only during a session -->
    <div class="dhikr-block" id="dhikrBlock">
      <div class="dhikr-step" id="dhikrStep"></div>
      <div class="dhikr-arabic" id="dhikrArabic"></div>
      <div class="dhikr-translation" id="dhikrTranslation"></div>
      <div class="dhikr-source" id="dhikrSource"></div>
    </div>

    <!-- ring -->
    <div class="ring-wrap" id="ringWrap">
      <div class="tap-zone" id="tapZone" onclick="tap()">
        <svg class="ring-svg" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="#c9aa52"/>
              <stop offset="50%"  stop-color="#dfc070"/>
              <stop offset="100%" stop-color="#c9aa52"/>
            </linearGradient>
          </defs>
          <circle cx="140" cy="140" r="118" fill="none" stroke="#1e222c" stroke-width=".8" stroke-dasharray="4 11" id="ringDeco"/>
          <circle cx="140" cy="140" r="128" class="r-track"/>
          <circle cx="140" cy="140" r="128" class="r-fill" id="ringFill"
            stroke-dasharray="804.25" stroke-dashoffset="804.25"/>
        </svg>
        <div class="ring-center">
          <div class="count-num" id="countNum">0</div>
          <div class="count-of"  id="countOf">of 33</div>
        </div>
      </div>
    </div>

    <!-- free-mode controls (goal pills + reset) -->
    <div class="free-controls" id="freeControls">
      <div class="goal-wrap">
        <span class="goal-label">Goal</span>
        <div class="goal-pills">
          <button class="pill active" onclick="setGoal(33,this)">33</button>
          <button class="pill"        onclick="setGoal(99,this)">99</button>
          <button class="pill"        onclick="setGoal(100,this)">100</button>
        </div>
      </div>
      <div class="goal-custom-wrap">
        <input class="goal-input" id="goalInput" type="number" min="1" max="9999"
               placeholder="custom" onkeydown="if(event.key==='Enter')applyCustom()">
        <button class="goal-set-btn" onclick="applyCustom()">Set</button>
      </div>
      <div style="margin-top:28px;width:100%;display:flex;justify-content:center">
        <button class="btn btn-ghost" style="max-width:220px" onclick="reset()">&#x21BA;&nbsp; Reset</button>
      </div>
    </div>

    <!-- session controls (skip + end) -->
    <div class="session-controls" id="sessionControls">
      <div class="session-progress" id="sessionProgress"></div>
      <div class="session-btns">
        <button class="btn btn-ghost" onclick="reset()">&#x21BA;&nbsp; Reset</button>
        <button class="btn btn-ghost" onclick="skipDhikr()">Skip &rarr;</button>
        <button class="btn btn-end"   onclick="endSession()">End</button>
      </div>
    </div>

  </section>

  <!-- ══════════ ADHKAR TAB ══════════ -->
  <section class="tab" id="tab-adhkar">

    <div class="adhkar-section">
      <div class="section-head">&#x2600;&#xFE0F;&nbsp; Morning Adhkar &middot; &#x627;&#x644;&#x623;&#x630;&#x643;&#x627;&#x631; &#x627;&#x644;&#x635;&#x628;&#x627;&#x62D;&#x64A;&#x629;</div>
      <button class="start-btn start-btn-morning" onclick="startSession('morning')">
        <span>Start Morning Session</span>
        <span class="start-btn-arrow">&#x25B6;</span>
      </button>
      <div class="adhkar-list" id="morning-list"></div>
    </div>

    <div class="adhkar-section">
      <div class="section-head">&#x1F319;&nbsp; Evening Adhkar &middot; &#x627;&#x644;&#x623;&#x630;&#x643;&#x627;&#x631; &#x627;&#x644;&#x645;&#x633;&#x627;&#x626;&#x64A;&#x629;</div>
      <button class="start-btn start-btn-evening" onclick="startSession('evening')">
        <span>Start Evening Session</span>
        <span class="start-btn-arrow">&#x25B6;</span>
      </button>
      <div class="adhkar-list" id="evening-list"></div>
    </div>

  </section>

  <!-- ── Nav ── -->
  <nav class="nav">
    <button class="nav-btn active" data-tab="counter" onclick="goTab('counter')">
      <span class="nav-icon">&#x25C9;</span>
      <span class="nav-lbl">Counter</span>
    </button>
    <button class="nav-btn" data-tab="adhkar" onclick="goTab('adhkar')">
      <span class="nav-icon">&#x263E;</span>
      <span class="nav-lbl">Adhkar</span>
    </button>
  </nav>

</div><!-- #app -->

<script>
// ═══════════════════════════════════════════════════
//  ADHKAR DATA
// ═══════════════════════════════════════════════════
const ADHKAR = {
  morning: [
    {
      title: "Wake-Up Dhikr",
      arabic: "اَلْحَمْدُ لِلَّهِ الَّذِيْ أَحْيَانَا بَعْدَ مَا أَمَاتَنَا وَإِلَيْهِ النُّشُوْرُ",
      translation: "Praise be to Allah who resurrected us after He made us die, and to Him is the final return.",
      source: "Bukhārī 6312 · Muslim 2710",
      count: 1
    },
    {
      title: "Āyat al-Kursī",
      arabic: "اللَّهُ لَآ إِلٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّوْمُ ۚ لَا تَأْخُذُهٗ سِنَةٌ وَّلَا نَوْمٌ ۚ لَهٗ مَا فِي السَّمٰوٰتِ وَمَا فِي الْأَرْضِ ۗ مَنْ ذَا الَّذِيْ يَشْفَعُ عِنْدَهٗ إِلَّا بِإِذْنِهٖ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيْهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيْطُوْنَ بِشَيْءٍ مِّنْ عِلْمِهٖ إِلَّا بِمَا شَآءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمٰوٰتِ وَالْأَرْضَ ۖ وَلَا يَئُوْدُهٗ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيْمُ",
      translation: "Allah — there is no deity except Him, the Ever-Living, the Sustainer of existence. Neither drowsiness overtakes Him nor sleep. To Him belongs whatever is in the heavens and whatever is on the earth. Who is it that can intercede with Him except by His permission? He knows what is before them and what will be after them, and they encompass not a thing of His knowledge except for what He wills. His throne extends over the heavens and the earth, and their preservation tires Him not. And He is the Most High, the Most Great. [al-Baqarah 2:255]",
      source: "Ṣaḥīḥ al-Targhīb 662 · al-Kalim al-Ṭayyib 19",
      count: 1
    },
    {
      title: "Sūrat al-Ikhlāṣ",
      arabic: "قُلْ هُوَ اللَّهُ أَحَدٌ ۝ اللَّهُ الصَّمَدُ ۝ لَمْ يَلِدْ وَلَمْ يُوْلَدْ ۝ وَلَمْ يَكُنْ لَّهٗ كُفُوًا أَحَدٌ",
      translation: "Say: He is Allah, the One. Allah, the Eternal Refuge. He neither begets nor is born, nor is there to Him any equivalent. [al-Ikhlāṣ 112]",
      source: "Abū Dāwūd 5082 · al-Kalim al-Ṭayyib 19",
      count: 3
    },

//  STATE
// ═══════════════════════════════════════════════════
const CIRC = 2 * Math.PI * 128; // 804.25
let count = 0, goal = 33;
let soundOn = true, hapticOn = true, isDark = true;

const sess = { active: false, type: null, step: 0 };

// DOM
const ringFill   = document.getElementById('ringFill');
const countNum   = document.getElementById('countNum');
const countOf    = document.getElementById('countOf');
const tapZone    = document.getElementById('tapZone');
const ringWrap   = document.getElementById('ringWrap');
const flash      = document.getElementById('flash');
const cflash     = document.getElementById('cflash');
const btnSound   = document.getElementById('btnSound');
const btnHaptic  = document.getElementById('btnHaptic');
const btnTheme   = document.getElementById('btnTheme');
const btnInstall = document.getElementById('btnInstall');
const ringDeco   = document.getElementById('ringDeco');
const dhikrBlock = document.getElementById('dhikrBlock');
const freeCtrl   = document.getElementById('freeControls');
const sessCtrl   = document.getElementById('sessionControls');

// ═══════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════
let audioCtx = null;
function getACtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beepTap() {
  if (!soundOn) return;
  try {
    const ctx = getACtx(), now = ctx.currentTime;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, now);
    osc.frequency.exponentialRampToValueAtTime(660, now + .07);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(.18, now + .008);
    g.gain.exponentialRampToValueAtTime(.001, now + .18);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(now); osc.stop(now + .2);
  } catch(_) {}
}
function beepComplete() {
  if (!soundOn) return;
  try {
    const ctx = getACtx();
    [[0,.660,.22],[.12,.880,.22],[.24,1.100,.28]].forEach(([d,f,v]) => {
      const now = ctx.currentTime + d;
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(f * 1000, now);
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(v, now + .01);
      g.gain.exponentialRampToValueAtTime(.001, now + .55);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(now); osc.stop(now + .6);
    });
  } catch(_) {}
}

// ═══════════════════════════════════════════════════
//  HAPTICS
// ═══════════════════════════════════════════════════
function vibrate(p) { if (hapticOn && navigator.vibrate) navigator.vibrate(p); }

// ═══════════════════════════════════════════════════
//  CORE TAP
// ═══════════════════════════════════════════════════
function tap() {
  if (count >= goal) return;
  vibrate(22); beepTap(); count++;
  countNum.classList.remove('bump'); void countNum.offsetWidth; countNum.classList.add('bump');
  setTimeout(() => countNum.classList.remove('bump'), 110);
  tapZone.classList.remove('tapped'); void tapZone.offsetWidth; tapZone.classList.add('tapped');
  draw();
  if (count >= goal) onComplete();
}

function onComplete() {
  vibrate([40,30,80,30,140]);
  ringFill.classList.add('done');
  ringWrap.classList.remove('glow'); void ringWrap.offsetWidth; ringWrap.classList.add('glow');

  if (sess.active) {
    beepComplete();
    cflash.classList.remove('show'); void cflash.offsetWidth; cflash.classList.add('show');
    const list = ADHKAR[sess.type];
    if (sess.step < list.length - 1) {
      setTimeout(() => {
        sess.step++;
        loadSessionStep();
      }, 1400);
    } else {
      // Session fully complete
      setTimeout(() => {
        flash.classList.remove('show'); void flash.offsetWidth; flash.classList.add('show');
        endSession();
      }, 1400);
    }
  } else {
    beepComplete();
    flash.classList.remove('show'); void flash.offsetWidth; flash.classList.add('show');
  }
}

function reset() {
  count = 0;
  ringFill.classList.remove('done');
  vibrate(14);
  draw();
}

function draw() {
  const p = Math.min(count / goal, 1);
  ringFill.style.strokeDashoffset = CIRC * (1 - p);
  countNum.textContent = count;
  countOf.textContent  = 'of ' + goal;
}

// ═══════════════════════════════════════════════════
//  FREE-MODE GOAL
// ═══════════════════════════════════════════════════
function setGoal(val, btn) {
  goal = val;
  document.getElementById('goalInput').value = '';
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  if (btn) btn.classList.add('active');
  reset();
}
function applyCustom() {
  const v = parseInt(document.getElementById('goalInput').value);
  if (!v || v < 1) return;
  goal = Math.min(v, 9999);
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  reset();
}

// ═══════════════════════════════════════════════════
//  SESSION
// ═══════════════════════════════════════════════════
function startSession(type) {
  sess.active = true;
  sess.type   = type;
  sess.step   = 0;
  loadSessionStep();
  goTab('counter');
}

function loadSessionStep() {
  const dhikr = ADHKAR[sess.type][sess.step];
  goal  = dhikr.count;
  count = 0;
  ringFill.classList.remove('done');
  draw();

  // Populate text block
  const total = ADHKAR[sess.type].length;
  document.getElementById('dhikrStep').textContent =
    (sess.type === 'morning' ? 'Morning' : 'Evening') +
    ' Adhkar — ' + (sess.step + 1) + ' of ' + total;
  document.getElementById('dhikrArabic').textContent      = dhikr.arabic;
  document.getElementById('dhikrTranslation').textContent = dhikr.translation;
  document.getElementById('dhikrSource').textContent      = dhikr.source;

  // Show session UI
  dhikrBlock.classList.add('visible');
  ringWrap.classList.add('small');
  freeCtrl.classList.add('hidden');
  sessCtrl.classList.add('visible');

  document.getElementById('sessionProgress').textContent =
    dhikr.title + (dhikr.count > 1 ? '  ×' + dhikr.count : '');
}

function skipDhikr() {
  const list = ADHKAR[sess.type];
  if (sess.step < list.length - 1) {
    sess.step++;
    loadSessionStep();
  } else {
    endSession();
  }
}

function endSession() {
  sess.active = false;
  sess.type   = null;
  sess.step   = 0;
  // restore free mode
  dhikrBlock.classList.remove('visible');
  ringWrap.classList.remove('small');
  freeCtrl.classList.remove('hidden');
  sessCtrl.classList.remove('visible');
  goal = 33;
  count = 0;
  ringFill.classList.remove('done');
  draw();
  document.querySelectorAll('.pill').forEach((p,i) => p.classList.toggle('active', i===0));
}

// ═══════════════════════════════════════════════════
//  ADHKAR LIST RENDER
// ═══════════════════════════════════════════════════
function renderAdhkarLists() {
  ['morning','evening'].forEach(type => {
    document.getElementById(type + '-list').innerHTML =
      ADHKAR[type].map((d, i) =>
        `<div class="adhkar-row">
          <span class="adhkar-num">${i + 1}</span>
          <span class="adhkar-name">${d.title}</span>
          <span class="adhkar-count">${d.count > 1 ? '×' + d.count : '×1'}</span>
        </div>`
      ).join('');
  });
}

// ═══════════════════════════════════════════════════
//  TOGGLES
// ═══════════════════════════════════════════════════
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  btnTheme.innerHTML = isDark ? '&#x1F319;' : '&#x2600;&#xFE0F;';
  ringDeco.setAttribute('stroke', isDark ? '#1e222c' : '#ccc4b0');
  document.getElementById('themeMetaColor').setAttribute('content', isDark ? '#09090c' : '#f5f0e8');
}
function toggleSound() {
  soundOn = !soundOn;
  btnSound.innerHTML = soundOn ? '&#x1F50A;' : '&#x1F507;';
  btnSound.classList.toggle('on', soundOn);
  btnSound.classList.toggle('off', !soundOn);
  if (soundOn && audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function toggleHaptic() {
  hapticOn = !hapticOn;
  btnHaptic.innerHTML = hapticOn ? '&#x1F4F3;' : '&#x1F4F4;';
  btnHaptic.classList.toggle('on', hapticOn);
  btnHaptic.classList.toggle('off', !hapticOn);
}

// ═══════════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════════
function goTab(id) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  document.querySelector('[data-tab="' + id + '"]').classList.add('active');
}

// ═══════════════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (!document.getElementById('tab-counter').classList.contains('active')) return;
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); tap(); }
  if (e.code === 'KeyR') reset();
});

// ═══════════════════════════════════════════════════
//  WAKE LOCK
// ═══════════════════════════════════════════════════
async function wl() {
  if ('wakeLock' in navigator) { try { await navigator.wakeLock.request('screen'); } catch(_){} }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    wl();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
});

// ═══════════════════════════════════════════════════
//  PWA INSTALL
// ═══════════════════════════════════════════════════
let dip = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); dip = e;
  btnInstall.style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  btnInstall.style.display = 'none'; dip = null;
});
async function installApp() {
  if (!dip) return;
  dip.prompt();
  const { outcome } = await dip.userChoice;
  if (outcome === 'accepted') btnInstall.style.display = 'none';
  dip = null;
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
draw();
renderAdhkarLists();
wl();
</script>
</body>
</html>
